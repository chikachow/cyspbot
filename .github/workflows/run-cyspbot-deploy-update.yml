name: run-cyspbot-deploy-update

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  run:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: chikachow/cyspbot-app-token-action@1f621f4b3e5d912addc87108261d5b49e32cc6fb # v0.0.10
        id: cyspbot
        with:
          resource: https://api.github.com/repos/chikachow/cyspbot-deploy
          scope: actions:write

      - name: Run cyspbot-deploy update workflow
        run: gh workflow run update-cyspbot.yml --repo chikachow/cyspbot-deploy --ref main
        env:
          GH_TOKEN: ${{ steps.cyspbot.outputs.token }}
